<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Site</title>
    <script src="https://www.google.com/recaptcha/api.js?render=6LeH9pQqAAAAAPdEyc7IJS0woEx3ujyqOYNM7lwC"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .button {
            padding: 10px 20px;
            font-size: 18px;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #218838;
        }
        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Site</h1>
        <p>Update: Adding this paragraph to trigger a rebuild.</p>
        <!-- CAPTCHA Form -->
        <form id="captcha-form" action="http://localhost:3000/verify-captcha" method="POST">
            <input type="hidden" name="recaptcha_token" id="recaptcha_token">
            <button type="submit" class="button">Submit</button>
        </form>
    </div>
    <div class="footer">
        © My Minimalistic Site 2024
    </div>
    <script src="script.js"></script>
</body>
</html>
