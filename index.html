<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Link</title>
    <script>
        function handleClick() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('videoId');

            console.log('Video ID:', videoId);

            if (!videoId) {
                alert('Video ID not found.');
                return;
            }

            fetch(`https://kakifilem.netlify.app/.netlify/functions/send-video-link`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ videoId })
            }).then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            }).then(data => {
                console.log('Response data:', data);
                if (data.success) {
                    alert('Video link sent!');
                } else {
                    alert('Failed to send video link.');
                }
            }).catch(error => {
                console.error('Error:', error);
                alert('An error occurred.');
            });
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .button {
            padding: 10px 20px;
            font-size: 18px;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #218838;
        }
        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: white;
            background-color: black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Get Your Link</h1>
        <button class="button" onclick="handleClick()">Get Link</button>
    </div>
    <div class="footer">
        © Kakifilem 2024
    </div>
</body>
</html>
