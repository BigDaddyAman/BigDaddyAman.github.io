<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get File</title>
</head>
<body>
  <h1>File Delivery</h1>
  <p>Click the button below to confirm and receive your file in Telegram.</p>
  <button id="get-link-btn">Get File</button>

  <script>
    document.getElementById("get-link-btn").addEventListener("click", async () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        alert("Invalid or missing token.");
        return;
      }

      try {
        // Replace this URL with your bot's backend API
        const response = await fetch(`https://your-backend-server.com/api/send-file?token=${token}`, {
          method: "POST",
        });

        if (response.ok) {
          alert("The file has been sent to your Telegram account!");
        } else {
          alert("Failed to send the file. Please try again later.");
        }
      } catch (error) {
        console.error("Error sending the request:", error);
        alert("Something went wrong. Please try again later.");
      }
    });
  </script>
</body>
</html>
